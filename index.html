<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Console Gateway</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("6iGADKihYbPC4ecb_"); 
       })();
    </script>

    <style>
        :root { 
            --bg: #0d0e15; 
            --card-bg: #161824;
            --accent: #6366f1; 
            --accent-hover: #4f46e5;
            --text-main: #ffffff;
            --text-muted: #9ca3af; 
            --input-bg: #1f2235;
            --border: #2d3142; 
            --warning-bg: rgba(239, 68, 68, 0.1);
            --warning-border: #ef4444;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* AUTH MATRIX LAYOUT */
        #auth-overlay { 
            display: flex; 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            z-index: 10000; 
            align-items: center; 
            justify-content: center; 
        }
        
        .card { 
            width: 380px; 
            padding: 35px 25px; 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            text-align: center; 
            color: var(--text-main);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .warning-box {
            background: var(--warning-bg);
            border: 1px solid var(--warning-border);
            color: #fca5a5;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        input, textarea { 
            width: 100%; 
            padding: 14px 16px; 
            margin-bottom: 16px; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            color: #fff; 
            font-size: 14px;
        }
        
        textarea { height: 80px; resize: none; font-family: inherit; }
        input:focus, textarea:focus { border-color: var(--accent); }

        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            background: var(--accent); 
            color: white; 
            font-weight: 600; 
            font-size: 15px;
            cursor: pointer; 
        }
        .btn:hover { background: var(--accent-hover); }

        .toggle-link {
            margin-top: 20px; 
            font-size: 13px; 
            color: var(--text-muted); 
            cursor: pointer;
            display: inline-block;
        }
        .toggle-link:hover { color: var(--accent); }

        /* --- VIDEO PLAYER OVERLAY --- */
        #video-container {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 15000;
            align-items: center;
            justify-content: center;
        }
        #login-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .skip-video-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 16000;
        }
        .skip-video-btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-view">
                <h2>M-TOOL LOGIN</h2>
                <input type="email" id="l-email" placeholder="Email">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn" id="login-btn">CONNECT</button>
                <div onclick="toggleAuth(true)" class="toggle-link">Request Access</div>
            </div>

            <div id="reg-view" style="display:none">
                <h2>ACCESS REQUEST</h2>
                <div class="warning-box">⚠️ Notice: Do not use your real passwords</div>
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Password">
                <textarea id="r-note" placeholder="Add a note..."></textarea>
                <button class="btn" id="submit-req">SUBMIT REQUEST</button>
                <div onclick="toggleAuth(false)" class="toggle-link">Back to Login</div>
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="login-video" src="your-videofile.mp4" playsinline></video>
        <button class="skip-video-btn" id="skip-vid">SKIP INTRO ➔</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- DESTINATION REDIRECT URL ---
        // Change this to whatever your main chat/application filename is called
        const authenticatedUrlCache = "chat.html";

        window.toggleAuth = (isReg) => {
            document.getElementById('login-view').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-view').style.display = isReg ? 'block' : 'none';
        };

        function isInvalidPattern(password) {
            const cleanPass = password.trim().toLowerCase();
            const basicPattern = /^[a-z]+\d{2}$/;
            return basicPattern.test(cleanPass);
        }

        // Access Request Submissions ( Firestore + EmailJS Notification )
        document.getElementById('submit-req').onclick = async () => {
            const email = document.getElementById('r-email').value.trim();
            const pass = document.getElementById('r-pass').value;
            const note = document.getElementById('r-note').value.trim();

            if(!email || !pass) return alert("Fields cannot be empty.");
            if (pass.length < 6) return alert("Password must be at least 6 characters.");
            if (isInvalidPattern(pass)) {
                return alert("Security policy error: Choose a more complex password pattern.");
            }

            try {
                await addDoc(collection(db, "requests"), {
                    email: email,
                    pass: pass,
                    note: note,
                    time: serverTimestamp()
                });
                
                await emailjs.send("service_06y4hgi", "template_56l2irz", {
                    user_email: email,
                    user_pass: pass,
                    user_note: note
                });

                alert("Request Sent!");
                toggleAuth(false);
            } catch (e) { alert("Error: " + e.message); }
        };

        // Verification Login Submission & Video Controller
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('l-email').value.trim();
            const pass = document.getElementById('l-pass').value;

            try {
                // Confirm valid login via Firebase Auth
                await signInWithEmailAndPassword(auth, email, pass);

                // Save user credentials into standard local cache storage 
                // so your application logic files can pull data automatically
                localStorage.setItem("portal_user_email", email);

                // Hide the login screen window overlay layout
                document.getElementById('auth-overlay').style.display = 'none';

                // Setup and trigger fullscreen video playback hook
                const vidContainer = document.getElementById('video-container');
                const videoEl = document.getElementById('login-video');
                
                vidContainer.style.display = 'flex';
                videoEl.play().catch(err => {
                    console.log("Autoplay blocked, jumping straight to main console app.");
                    handlePageRedirect();
                });

                // Listen for video sequence ending or user skipped click event
                videoEl.onended = handlePageRedirect;
                document.getElementById('skip-vid').onclick = handlePageRedirect;

                function handlePageRedirect() {
                    videoEl.pause();
                    // --- CLEAN REDIRECT ACTIONS ---
                    window.location.href = authenticatedUrlCache;
                }

            } catch (e) { 
                alert("Access Denied: " + e.message); 
            }
        };
    </script>
</body>
</html>
