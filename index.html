<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACMemes & Arcade Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        /* Portal Navigation Rail Styling */
        .portal-rail {
            width: 70px;
            background: #202225;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 15px;
            border-right: 1px solid #111;
        }
        .portal-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #36393f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #b9bbbe;
        }
        .portal-icon:hover, .portal-icon.active {
            border-radius: 16px;
            background: #5865f2;
            color: #fff;
        }
        .frame-container {
            flex: 1;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="auth-container" class="auth-box">
        <h2>Welcome to ACMemes Portal</h2>
        <form id="auth-form" onsubmit="event.preventDefault(); handleLogin();">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn">Login</button>
        </form>
        <p id="toggle-auth">Don't have an account? <span id="toggle-link">Sign Up</span></p>
    </div>

    <div id="app-container" class="hidden" style="display: flex; height: 100vh; width: 100vw; overflow: hidden;">
        
        <div class="portal-rail">
            <div class="portal-icon active" id="btn-show-chat" title="ACMemes Chat">💬</div>
            <div class="portal-icon" id="btn-show-arcade" title="Game Arcade">🎮</div>
        </div>

        <div class="frame-container">
            <div id="view-chat" style="display: flex; width: 100%; height: 100%;">
                </div>

            <div id="view-arcade" class="hidden" style="width: 100%; height: 100%;">
                <iframe src="arcade.html" id="arcade-frame"></iframe>
            </div>
        </div>

    </div>

    <script>
        // Simple View Switching Logic
        function handleLogin() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
        }

        const chatBtn = document.getElementById('btn-show-chat');
        const arcadeBtn = document.getElementById('btn-show-arcade');
        const chatView = document.getElementById('view-chat');
        const arcadeView = document.getElementById('view-arcade');

        chatBtn.addEventListener('click', () => {
            chatBtn.classList.add('active');
            arcadeBtn.classList.remove('active');
            chatView.classList.remove('hidden');
            arcadeView.classList.add('hidden');
        });

        arcadeBtn.addEventListener('click', () => {
            arcadeBtn.classList.add('active');
            chatBtn.classList.remove('active');
            arcadeView.classList.remove('hidden');
            chatView.classList.add('hidden');
        });
    </script>
</body>
</html>
