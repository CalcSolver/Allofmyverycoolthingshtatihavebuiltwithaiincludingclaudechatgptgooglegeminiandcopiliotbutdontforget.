<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Gateway</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("6iGADKihYbPC4ecb_"); })();
    </script>
    <style>
        :root { 
            --bg: #0d0e15; --card-bg: #161824; --accent: #6366f1; 
            --accent-hover: #4f46e5; --text-main: #ffffff; --text-muted: #9ca3af; 
            --input-bg: #1f2235; --border: #2d3142; --warning-bg: rgba(239, 68, 68, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; font-family: sans-serif; }
        #auth-overlay { display: flex; position: fixed; inset: 0; background: var(--bg); z-index: 10000; align-items: center; justify-content: center; }
        .card { width: 380px; padding: 35px 25px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; text-align: center; }
        input, textarea { width: 100%; padding: 14px 16px; margin-bottom: 16px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: #fff; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: 600; cursor: pointer; }
        .btn:hover { background: var(--accent-hover); }
        .toggle-link { margin-top: 20px; font-size: 13px; color: var(--text-muted); cursor: pointer; display: inline-block; }
        #video-container { display: none; position: fixed; inset: 0; background: #000; z-index: 15000; align-items: center; justify-content: center; }
        #login-video { width: 100%; height: 100%; object-fit: cover; }
        .skip-video-btn { position: absolute; bottom: 30px; right: 30px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        #portal { display: none; position: fixed; inset: 0; background: var(--bg); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-view">
                <h2>M-TOOL LOGIN</h2>
                <input type="email" id="l-email" placeholder="Email">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn" id="login-btn">CONNECT</button>
                <div onclick="toggleAuth(true)" class="toggle-link">Request Access</div>
            </div>
            <div id="reg-view" style="display:none">
                <h2>ACCESS REQUEST</h2>
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Password">
                <textarea id="r-note" placeholder="Add a note..."></textarea>
                <button class="btn" id="submit-req">SUBMIT REQUEST</button>
                <div onclick="toggleAuth(false)" class="toggle-link">Back to Login</div>
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="login-video" src="your-videofile.mp4" playsinline></video>
        <button class="skip-video-btn" id="skip-vid">SKIP INTRO ➔</button>
    </div>

    <div id="portal">
        <iframe id="portal-frame" src="about:blank" allowfullscreen></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.toggleAuth = (isReg) => {
            document.getElementById('login-view').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-view').style.display = isReg ? 'block' : 'none';
        };

        document.getElementById('submit-req').onclick = async () => {
            const email = document.getElementById('r-email').value.trim();
            const pass = document.getElementById('r-pass').value;
            const note = document.getElementById('r-note').value.trim();
            try {
                await addDoc(collection(db, "requests"), { email, pass, note, time: serverTimestamp() });
                await emailjs.send("service_06y4hgi", "template_56l2irz", { user_email: email, user_pass: pass, user_note: note });
                alert("Request Sent!"); toggleAuth(false);
            } catch (e) { alert("Error: " + e.message); }
        };

        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('l-email').value.trim();
            const pass = document.getElementById('l-pass').value;
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                // Save the session details inside window storage so inner scripts read it automatically!
                localStorage.setItem("portal_user", JSON.stringify({ email: userCredential.user.email }));

                document.getElementById('auth-overlay').style.display = 'none';
                const vidContainer = document.getElementById('video-container');
                const videoEl = document.getElementById('login-video');
                
                vidContainer.style.display = 'flex';
                videoEl.play().catch(() => revealPortalLayout());
                videoEl.onended = revealPortalLayout;
                document.getElementById('skip-vid').onclick = revealPortalLayout;

                function revealPortalLayout() {
                    videoEl.pause();
                    vidContainer.style.display = 'none';
                    document.getElementById('portal-frame').src = "iframe.html";
                    document.getElementById('portal').style.display = 'block';
                }
            } catch (e) { alert("Access Denied: " + e.message); }
        };
    </script>
</body>
</html>
